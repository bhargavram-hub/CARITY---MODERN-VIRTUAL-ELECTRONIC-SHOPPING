<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google Pixel Models | CARTIFY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
header{background:#1f3b57;color:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;}
header a{color:white;text-decoration:none;font-weight:bold;}
h2{text-align:center;margin:25px 0;}
.models{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px;padding:0 40px 60px;}
.model-card{background:white;padding:20px;border-radius:14px;text-align:center;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,0.1);transition:0.3s;}
.model-card:hover{transform:translateY(-8px);}
.model-card img{width:130px;}
.price{color:green;font-weight:bold;}
</style>
</head>

<body>

<header>
<h1>Google Pixel</h1>
<a href="smartphones.html">⬅ Back to Brands</a>
</header>

<h2>Google Pixel Models</h2>

<div class="models">

<div class="model-card" onclick="location.href='model-details.html'">
<img src="images/pixel8pro.jpg">
<h3>Pixel 8 Pro</h3>
<p class="price">₹1,06,999</p>
</div>

<div class="model-card" onclick="location.href='model-details.html'">
<img src="images/pixel8.jpg">
<h3>Pixel 8</h3>
<p class="price">₹75,999</p>
</div>

<div class="model-card" onclick="location.href='model-details.html'">
<img src="images/pixel7.jpg">
<h3>Pixel 7</h3>
<p class="price">₹59,999</p>
</div>

<div class="model-card" onclick="location.href='model-details.html'">
<img src="images/pixel6a.jpg">
<h3>Pixel 6a</h3>
<p class="price">₹43,999</p>
</div>

</div>
</body>
</html>
